# Copy to secret.yaml (gitignored — repo .gitignore matches *secret.yaml) and
# fill in real values, then `kubectl apply -f secret.yaml`.
#
# Two secrets:
#   1. exp-dashboard-credentials — app env vars (envFrom in deployment)
#   2. exp-dashboard-gcp-key     — the GCP SA JSON, mounted at /var/secrets/gcp
#      (dedicated, product-scoped name — NOT the shared namespace secret
#       `gcp-service-account-key`, which other apps use and stores its key under
#       a different field name)
#
# Applying resets the deployment image to :latest — re-run the deploy workflow
# afterward to re-pin the digest.
apiVersion: v1
kind: Secret
metadata:
  name: exp-dashboard-credentials
  namespace: data-ingestion
type: Opaque
stringData:
  JWT_SECRET: "<64-hex-secret>"
  DASHBOARD_PASSWORD: "<shared-password>"
  BQ_PROJECT_ID: "educate-data-warehouse-test"
  BQ_DATASET: "gold_exp"
  BQ_TABLE: "exp_ai_dashboard_model"
  CLIENT_HEADER_NAME: "X-Exp-Client"
  CLIENT_HEADER_TOKEN: "dashboard-v1"
  OAUTH_ALLOWED_DOMAIN: "experienceeducate.org"
  GOOGLE_CLIENT_ID: "<oauth-client-id>"
  GOOGLE_CLIENT_SECRET: "<oauth-client-secret>"
  FRONTEND_URL: "https://exp-dashboard.educateapps.work"
  EXTRA_CORS_ORIGINS: "https://exp-dashboard.educateapps.work"
---
# Create from the JSON key file instead of pasting it here (recommended):
#   kubectl create secret generic exp-dashboard-gcp-key \
#     --from-file=key.json=./exp-dashboard-srvc-acc.json -n data-ingestion
apiVersion: v1
kind: Secret
metadata:
  name: exp-dashboard-gcp-key
  namespace: data-ingestion
type: Opaque
stringData:
  key.json: |
    { "REPLACE": "with the GCP service-account JSON" }
