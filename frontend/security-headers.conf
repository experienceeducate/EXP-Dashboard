# Security headers. `include`d from EACH nginx location block — never use a bare
# per-location add_header for these (a location-level add_header shadows all
# server-level ones). CSP is self-contained; adjust connect-src to the API host.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://exp-dashboard-api.educateapps.work; frame-ancestors 'none'; base-uri 'self'" always;
