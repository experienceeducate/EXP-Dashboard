# gitleaks config — extends the default ruleset, adds an allowlist for
# verified false positives. secret-scan.yml hard-fails on any real finding.
[extend]
useDefault = true

[allowlist]
description = "Verified false positives"
paths = [
  '''backend/\.env\.example''',
  '''legacy/dashboard-v1\.html''',   # legacy single-file app; public GAS URL only, no secrets
  '''(^|/)index\.html$''',           # same legacy app under its historical path + the Vite entry
  '''.*\.md''',
]
regexes = [
  # Placeholder values used in docs/examples.
  '''change-me.*''',
  '''your-.*-here''',
  # BigQuery column names, not secrets — the "...Key: 'gm1_total_scholars'" shape
  # (object property named schlKey) trips the generic-api-key entropy heuristic.
  '''gm[1-3]_total_scholars''',
]
